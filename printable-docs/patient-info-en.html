<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Information Sheet - English | Pal Optical</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap");

        body {
            font-family: "Inter", sans-serif;
            margin: 0;
            padding: 0.5in;
            max-width: 8.5in;
        }

        .pt-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .pt-title {
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1;
        }

        .pt-subtitle {
            font-size: 0.65rem;
            color: #6b7280;
            font-style: italic;
        }

        .pt-section-header {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background-color: #f3f4f6;
            padding: 0.25rem 0.5rem;
            margin-bottom: 0.75rem;
            border-left: 4px solid #2563eb;
        }

        .pt-grid-12 {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .pt-col-1 {
            grid-column: span 1;
        }

        .pt-col-2 {
            grid-column: span 2;
        }

        .pt-col-3 {
            grid-column: span 3;
        }

        .pt-col-4 {
            grid-column: span 4;
        }

        .pt-col-5 {
            grid-column: span 5;
        }

        .pt-col-6 {
            grid-column: span 6;
        }

        .pt-col-12 {
            grid-column: span 12;
        }

        .pt-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: #4b5563;
            text-transform: uppercase;
            display: block;
            margin-bottom: 2px;
        }

        .pt-input {
            border-bottom: 1px solid #d1d5db;
            width: 100%;
            padding-bottom: 2px;
            font-size: 0.875rem;
            font-family: "Courier New", monospace;
            min-height: 1.2em;
        }

        .pt-footer {
            padding-top: 10px;
            display: flex;
            gap: 20px;
            align-items: flex-end;
            margin-top: 20px;
            border-top: 2px solid #000;
            padding-top: 10px;
        }

        .signature-canvas-container {
            border: 2px solid #000;
            background: #fff;
            margin: 10px 0;
            position: relative;
        }

        #signatureCanvas {
            width: 100%;
            height: 80px;
            cursor: crosshair;
            display: block;
        }

        .signature-buttons {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .sig-btn {
            padding: 8px 16px;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.875rem;
        }

        .sig-btn:hover {
            background: #000;
            color: #fff;
        }

        .sig-btn.primary {
            background: #000;
            color: #fff;
        }

        .sig-btn.primary:hover {
            background: #333;
        }

        @media print {
            body {
                padding: 0.5in;
            }

            .signature-buttons {
                display: none !important;
            }

            .signature-canvas-container {
                border: 1px solid #000;
            }
        }
    </style>
</head>

<body>
    <div class="pt-header">
        <div>
            <h1 class="pt-title">PATIENT INFORMATION</h1>
        </div>
        <p class="pt-subtitle">Please print clearly.</p>
    </div>

    <div class="pt-section-header">Patient Details</div>
    <div class="pt-grid-12">
        <div class="pt-col-6">
            <label class="pt-label">Patient Name (Last, First, MI)</label>
            <input type="text" class="pt-input" />
        </div>
        <div class="pt-col-3">
            <label class="pt-label">Date of Birth</label>
            <input type="date" class="pt-input" />
        </div>
        <div class="pt-col-3">
            <label class="pt-label">Gender</label>
            <input type="text" class="pt-input" placeholder="M/F/Other" />
        </div>
    </div>
    <div class="pt-grid-12">
        <div class="pt-col-5">
            <label class="pt-label">Street Address</label>
            <input type="text" class="pt-input" />
        </div>
        <div class="pt-col-4">
            <label class="pt-label">City</label>
            <input type="text" class="pt-input" />
        </div>
        <div class="pt-col-1">
            <label class="pt-label">State</label>
            <input type="text" class="pt-input" />
        </div>
        <div class="pt-col-2">
            <label class="pt-label">Zip</label>
            <input type="text" class="pt-input" />
        </div>
    </div>
    <div class="pt-grid-12">
        <div class="pt-col-3">
            <label class="pt-label">SSN</label>
            <input type="text" class="pt-input" />
        </div>
        <div class="pt-col-3">
            <label class="pt-label">Phone</label>
            <input type="text" class="pt-input" placeholder="(XXX) XXX-XXXX" />
        </div>
        <div class="pt-col-6">
            <label class="pt-label">Email</label>
            <input type="email" class="pt-input" />
        </div>
    </div>

    <div class="pt-section-header">Insurance Information</div>
    <div class="pt-grid-12">
        <div class="pt-col-4">
            <label class="pt-label">Primary Insurance Name</label>
            <input type="text" class="pt-input" />
        </div>
        <div class="pt-col-3">
            <label class="pt-label">Member ID #</label>
            <input type="text" class="pt-input" />
        </div>
        <div class="pt-col-5">
            <label class="pt-label">Policyholder/Employer</label>
            <input type="text" class="pt-input" />
        </div>
    </div>

    <div class="pt-section-header">HIPAA &amp; Consent</div>
    <p style="font-size: 0.75rem; margin-bottom: 20px">
        I acknowledge I have received and reviewed the Notice of Privacy Practices (HIPAA) and authorize treatment.
    </p>

    <div class="pt-footer">
        <div style="flex: 3">
            <label class="pt-label" style="margin-bottom: 5px;">Patient / Guardian Signature:</label>
            <div class="signature-canvas-container">
                <canvas id="signatureCanvas"></canvas>
            </div>
            <div class="signature-buttons no-print">
                <button class="sig-btn" onclick="clearSignature()">Clear Signature</button>
                <button class="sig-btn primary" onclick="printDocument()">Print Document</button>
            </div>
        </div>
        <div style="flex: 1">
            <div style="border-bottom: 2px solid #000; margin-bottom: 5px; min-height: 1.5em;"></div>
            <label class="pt-label">Date</label>
        </div>
    </div>

    <script>
        // Initialize signature canvas
        var canvas = document.getElementById('signatureCanvas');
        var ctx = canvas.getContext('2d');
        var isDrawing = false;
        var lastX = 0;
        var lastY = 0;

        // Set canvas size
        function resizeCanvas() {
            var container = canvas.parentElement;
            canvas.width = container.offsetWidth;
            canvas.height = 80;
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Drawing functions
        function startDrawing(e) {
            isDrawing = true;
            var rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            var rect = canvas.getBoundingClientRect();
            var currentX = e.clientX - rect.left;
            var currentY = e.clientY - rect.top;

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(currentX, currentY);
            ctx.stroke();

            lastX = currentX;
            lastY = currentY;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // Mouse events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch events
        canvas.addEventListener('touchstart', function (e) {
            e.preventDefault();
            var touch = e.touches[0];
            var mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });

        canvas.addEventListener('touchmove', function (e) {
            e.preventDefault();
            var touch = e.touches[0];
            var mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });

        canvas.addEventListener('touchend', function (e) {
            var mouseEvent = new MouseEvent('mouseup', {});
            canvas.dispatchEvent(mouseEvent);
        });

        // Clear signature
        function clearSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Print document
        function printDocument() {
            window.print();
        }
    </script>
</body>

</html>
