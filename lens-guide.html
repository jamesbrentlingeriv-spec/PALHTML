<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pal Optical Lens Viewing Guide</title>
    <style>
        :root {
            /* Light Mode Variables */
            --bg-main: #ffffff;
            --bg-panel: #ffffff;
            --bg-hover: #f0f0f0;
            --text-main: #000000;
            --text-muted: #666666;
            --border-color: #cccccc;
            --active-bg: #000000;
            --active-text: #ffffff;
            --diagram-bg: #fafafa;

            /* Vision Indicators */
            --clear-vision: #000000;
            --blurry-vision: #bbbbbb;
            --fill-opacity: 0.15;
        }

        /* Welcome Overlay */
        #welcome-overlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: #000000;
            z-index: 100000;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        #welcome-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #welcome-gif {
            width: 60vmin;
            height: 60vmin;
            max-width: 400px;
            max-height: 400px;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        /* Center GIF on mobile */
        @media screen and (max-width: 768px) {
            #welcome-gif {
                max-width: 90vw;
                max-height: 90vh;
                width: auto;
                height: auto;
            }
        }

        [data-theme="dark"] {
            /* Dark Mode Variables */
            --bg-main: #121212;
            --bg-panel: #1e1e1e;
            --bg-hover: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #444444;
            --active-bg: #ffffff;
            --active-text: #000000;
            --diagram-bg: #181818;

            /* Vision Indicators */
            --clear-vision: #ffffff;
            --blurry-vision: #444444;
            --fill-opacity: 0.25;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            border-bottom: 2px solid var(--border-color);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-panel);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .theme-btn {
            background-color: var(--text-main);
            color: var(--bg-main);
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .theme-btn:hover {
            opacity: 0.8;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            flex-grow: 1;
            width: 100%;
            box-sizing: border-box;
        }

        /* Lens List Styling */
        .lens-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .lens-btn {
            background-color: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .lens-btn:hover {
            background-color: var(--bg-hover);
        }

        .lens-btn.active {
            background-color: var(--active-bg);
            color: var(--active-text);
            border-color: var(--active-bg);
        }

        /* Display Panel Styling */
        .display-panel {
            background-color: var(--bg-panel);
            border-radius: 4px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .display-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .display-header h2 {
            margin: 0;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .specs ul {
            padding-left: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .specs li {
            margin-bottom: 0.5rem;
        }

        .pros h4,
        .cons h4 {
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 4px;
        }

        /* Diagram Styling */
        .diagram-container {
            background-color: var(--diagram-bg);
            border-radius: 4px;
            padding: 1rem;
            border: 1px solid var(--border-color);
            position: relative;
            min-height: 300px;
        }

        .diagram-title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            font-size: 0.85rem;
            margin-top: 1rem;
            color: var(--text-muted);
        }

        .legend span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .line-sample {
            display: inline-block;
            width: 20px;
            height: 0;
        }

        .line-clear {
            border-top: 3px dashed var(--clear-vision);
        }

        .line-blurry {
            border-top: 2px dotted var(--blurry-vision);
        }

        .placeholder-text {
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            margin-top: 2rem;
        }

        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-panel);
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div id="welcome-overlay">
        <img id="welcome-gif" src="assets/loaders/lensguide.gif" alt="Lens Guide Welcome">
    </div>

    <a href="index.html"
        style="display: inline-block; padding: 10px 15px; margin: 10px; background-color: #ffb7c5; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">Back
        to Home</a>

    <header>
        <h1>Pal Optical Lens Viewing Guide</h1>
        <button class="theme-btn" id="theme-toggle">Toggle Dark Mode</button>
    </header>

    <div class="container">
        <div class="lens-list" id="lens-list">
        </div>

        <div class="display-panel" id="display-panel">
            <div class="placeholder-text">
                <h2>Welcome to the Viewing Guide</h2>
                <p>Please select a lens type from the menu to view its specifications and the visual corridor diagram.
                </p>
            </div>
        </div>
    </div>

    <footer>
        jamesbrentlinger2026&trade;
    </footer>

    <script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            // Re-render to update SVG colors if a lens is currently selected
            const activeBtn = document.querySelector('.lens-btn.active');
            if (activeBtn) activeBtn.click();
        });

        const lensData = [
            {
                id: 'sv-distance',
                name: 'Single Vision Distance',
                features: ['One continuous focal power throughout the entire lens.', 'Optimized strictly for objects far away (20+ feet).'],
                pros: ['Widest possible field of view for driving and walking.', 'Minimal peripheral distortion.'],
                cons: ['Does not provide near or intermediate vision assistance (requires removal to read).'],
                vision: { dist: 'clear', inter: 'blurry', near: 'blurry', shape: 'distance-only' }
            },
            {
                id: 'sv-reading',
                name: 'Single Vision Reading',
                features: ['One continuous focal power.', 'Optimized strictly for near working distance (approx. 14-16 inches).'],
                pros: ['Massive, uninterrupted field of view for reading materials.', 'Perfect for prolonged close-up tasks.'],
                cons: ['Blurry vision for computer screens and distance.', 'Must be removed or peered over to see across the room.'],
                vision: { dist: 'blurry', inter: 'blurry', near: 'clear', shape: 'near-only' }
            },
            {
                id: 'bifocal',
                name: 'Lined Bifocal (FT28)',
                features: ['Distance prescription in the top portion.', 'Visible D-shaped segment at the bottom containing the reading prescription.'],
                pros: ['Provides both distance and near vision in one frame.', 'Wide reading area within the segment.', 'Easy adaptation.'],
                cons: ['Visible line across the lens.', 'Complete lack of intermediate (computer distance) correction.', '"Image jump" when crossing the line.'],
                vision: { dist: 'clear', inter: 'blurry', near: 'clear', shape: 'split' }
            },
            {
                id: 'trifocal',
                name: 'Lined Trifocal (7x28)',
                features: ['Three distinct viewing zones separated by visible lines.', 'Contains distance, intermediate (arm\'s length), and near focal points.'],
                pros: ['Addresses the "computer dead zone" found in bifocals.', 'Wide reading and distance zones.'],
                cons: ['Two visible lines on the lens.', 'The intermediate segment is quite narrow vertically.', 'Multiple image jumps.'],
                vision: { dist: 'clear', inter: 'clear', near: 'clear', shape: 'triple' }
            },
            {
                id: 'standard-prog',
                name: 'Standard Progressive',
                features: ['Seamless transition from distance, through intermediate, to near.', 'No visible lines on the lens.'],
                pros: ['Cosmetically appealing.', 'Continuous range of vision for all distances.'],
                cons: ['Peripheral distortion ("swim" effect) on the sides.', 'The intermediate (computer) corridor is relatively narrow.'],
                vision: { dist: 'clear', inter: 'clear', near: 'clear', shape: 'hourglass-narrow' }
            },
            {
                id: 'premium-prog',
                name: 'Premium Progressive',
                features: ['Digitally surfaced lens customized to the wearer\'s frame and measurements.', 'Advanced seamless power transition.'],
                pros: ['Significantly wider viewing corridors for computer and reading.', 'Drastically reduced peripheral distortion.', 'Faster adaptation time.'],
                cons: ['Higher price point compared to standard progressives.'],
                vision: { dist: 'clear', inter: 'clear', near: 'clear', shape: 'hourglass-wide' }
            },
            {
                id: 'office-prog',
                name: 'Office Progressive (Computer)',
                features: ['Specialized occupational lens maximizing intermediate and near vision.', 'De-emphasizes or removes distance vision entirely.'],
                pros: ['Ergonomically ideal for prolonged desk and computer work.', 'Massive intermediate corridor reduces neck and eye strain.'],
                cons: ['Cannot be worn for driving or walking around safely.', 'Requires a separate pair of glasses for distance tasks.'],
                vision: { dist: 'blurry', inter: 'clear', near: 'clear', shape: 'office-cone' }
            }
        ];

        function getLineStyle(state) {
            return state === 'clear'
                ? 'stroke="#00ff00" stroke-width="4" stroke-dasharray="8,4" stroke-linecap="round"'
                : 'stroke="#ff0000" stroke-width="3" stroke-dasharray="3,6" stroke-linecap="round"';
        }

        function generateCubicleSVG(vision) {
            return `
            <svg viewBox="0 0 400 300" width="100%" height="100%" style="background-color: transparent;">
                <!-- Targets -->
                <rect x="150" y="240" width="150" height="10" fill="var(--text-main)" opacity="0.8" />
                <rect x="160" y="250" width="10" height="50" fill="var(--border-color)" />
                <rect x="270" y="250" width="10" height="50" fill="var(--border-color)" />
                
                <rect x="180" y="235" width="40" height="5" fill="var(--bg-main)" stroke="var(--border-color)"/>
                <text x="200" y="270" font-size="14" font-weight="bold" text-anchor="middle" fill="var(--text-main)">📱 PHONE (Reading)</text>

                <rect x="230" y="140" width="20" height="100" fill="var(--border-color)" />
                <rect x="225" y="130" width="30" height="110" fill="none" stroke="var(--text-main)" stroke-width="3"/>
                <text x="240" y="125" font-size="14" font-weight="bold" text-anchor="middle" fill="var(--text-main)">💻 COMPUTER (Intermediate)</text>

                <circle cx="350" cy="60" r="30" fill="none" stroke="var(--text-main)" stroke-width="3"/>
                <line x1="350" y1="60" x2="350" y2="40" stroke="var(--text-main)" stroke-width="3"/>
                <line x1="350" y1="60" x2="370" y2="60" stroke="var(--text-main)" stroke-width="3"/>
                <text x="370" y="70" font-size="14" font-weight="bold" text-anchor="start" fill="var(--text-main)">🕐 CLOCK (Distance)</text>

                <!-- PERSON WITH BODY -->
                <circle cx="65" cy="130" r="20" fill="#f0f0f0" stroke="var(--text-main)" stroke-width="4"/> <!-- Head -->
                <rect x="55" y="150" width="20" height="60" rx="10" fill="#f8f8f8" stroke="var(--text-main)" stroke-width="4"/> <!-- Body -->
                <line x1="55" y1="170" x2="45" y2="185" stroke="var(--text-main)" stroke-width="4" stroke-linecap="round"/> <!-- Left arm -->
                <line x1="75" y1="170" x2="85" y2="185" stroke="var(--text-main)" stroke-width="4" stroke-linecap="round"/> <!-- Right arm -->
                <line x1="60" y1="210" x2="55" y2="240" stroke="var(--text-main)" stroke-width="4" stroke-linecap="round"/> <!-- Left leg -->
                <line x1="70" y1="210" x2="75" y2="240" stroke="var(--text-main)" stroke-width="4" stroke-linecap="round"/> <!-- Right leg -->
                
                <!-- EYE FOCUS POINT -->
                <circle cx="65" cy="125" r="6" fill="var(--text-main)" stroke="none"/>
                
                <!-- THIN DOTTED VISION LINES -->
                <line x1="65" y1="125" x2="325" y2="60" stroke-width="3" stroke-dasharray="8,8" stroke-linecap="round" stroke="${vision.dist === 'clear' ? '#00ff00' : '#ff0000'}" />
                <line x1="65" y1="125" x2="230" y2="180" stroke-width="3" stroke-dasharray="8,8" stroke-linecap="round" stroke="${vision.inter === 'clear' ? '#00ff00' : '#ff0000'}" />
                <line x1="65" y1="125" x2="190" y2="235" stroke-width="3" stroke-dasharray="8,8" stroke-linecap="round" stroke="${vision.near === 'clear' ? '#00ff00' : '#ff0000'}" />
            </svg>
            `;
        }

        function renderInterface() {
            const listContainer = document.getElementById('lens-list');
            const displayPanel = document.getElementById('display-panel');

            lensData.forEach(lens => {
                const btn = document.createElement('button');
                btn.className = 'lens-btn';
                btn.textContent = lens.name;
                btn.onclick = () => {
                    document.querySelectorAll('.lens-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const featuresHtml = lens.features.map(f => `<li>${f}</li>`).join('');
                    const prosHtml = lens.pros.map(p => `<li>${p}</li>`).join('');
                    const consHtml = lens.cons.map(c => `<li>${c}</li>`).join('');
                    const svgHtml = generateCubicleSVG(lens.vision);

                    displayPanel.innerHTML = `
                        <div class="display-header">
                            <h2>${lens.name}</h2>
                        </div>
                        <div class="content-grid">
                            <div class="specs-column">
                                <div class="specs">
                                    <h3>Features</h3>
                                    <ul>${featuresHtml}</ul>
                                </div>
                                <div class="pros-cons">
                                    <div class="pros">
                                        <h4>Advantages</h4>
                                        <ul>${prosHtml}</ul>
                                    </div>
                                    <div class="cons">
                                        <h4>Limitations</h4>
                                        <ul>${consHtml}</ul>
                                    </div>
                                </div>
                            </div>
                            <div class="diagram-column">
                                <div class="diagram-container">
                                    <div class="diagram-title">Visual Corridor Demonstration</div>
                                    ${generateCubicleSVG(lens.vision)}
                                    <div class="legend">
                                        <span><div class="line-sample line-clear"></div> Clear Vision</span>
                                        <span><div class="line-sample line-blurry"></div> Blurry Vision</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                };
                listContainer.appendChild(btn);
            });
        }

        renderInterface();

        // 2 second welcome GIF overlay
        setTimeout(() => {
            const overlay = document.getElementById('welcome-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        }, 2000);
    </script>
</body>

</html>
